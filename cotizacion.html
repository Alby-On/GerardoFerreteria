<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Cotización - Comercializadora Makro SpA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cotizacion.css">
</head>
<body>

    <header id="header-placeholder"></header>
    
    <main class="content-wrapper">
        <div class="page-title">
            <h1>Solicitud de Presupuesto</h1>
            <p>Elige tu método de contacto preferido y recibe tu cotización formal.</p>
        </div>

        <section class="cotizacion-grid">
            <div class="resumen-cotizacion">
                <h3>Productos a Cotizar</h3>
                <div id="lista-cotizacion-items">
                    </div>
                <div class="total-referencial">
                    <strong>Estado: </strong>
                    <span id="total-ref-cot">Cargando productos...</span>
                </div>
            </div>

            <div class="contact-card">
                <form id="cotizacion-form">
                    <div class="form-group">
                        <label>Nombre o Razón Social</label>
                        <i class="fas fa-user"></i>
                        <input type="text" id="cot-nombre" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>RUT Empresa / Personal</label>
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="cot-rut" class="form-input" placeholder="12.345.678-9">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp de Contacto</label>
                        <i class="fab fa-whatsapp"></i>
                        <input type="tel" id="cot-telefono" class="form-input" placeholder="+569..." required>
                    </div>
                    <div class="form-group">
                        <label>Email de contacto</label>
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="cot-email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Mensaje Adicional</label>
                        <textarea id="cot-mensaje" class="form-input" placeholder="Ej: Indicar si necesita despacho a obra..."></textarea>
                    </div>

                    <div class="metodo-envio-selector">
                        <label>¿Cómo prefieres enviar esta cotización?</label>
                        <div class="opciones-metodo">
                            <input type="radio" id="metodo-email" name="metodo_contacto" value="email" checked>
                            <label for="metodo-email" class="label-radio">
                                <i class="fas fa-envelope"></i> Por Correo
                            </label>

                            <input type="radio" id="metodo-wsp" name="metodo_contacto" value="whatsapp">
                            <label for="metodo-wsp" class="label-radio">
                                <i class="fab fa-whatsapp"></i> Por WhatsApp
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="btn-enviar-cot">
                        <span id="texto-boton">Enviar Solicitud por Correo</span>
                        <i class="fas fa-paper-plane" id="icono-boton"></i>
                    </button>

                    <a href="productos.html?cat=all" class="btn-volver-productos">
                        <i class="fas fa-shopping-bag"></i> VOLVER A PRODUCTOS
                    </a>
                </form>
            </div>
        </section>
    </main>

    <div id="carrito-placeholder"></div>
    <div id="whatsapp-placeholder"></div>
    <footer id="footer-placeholder" class="main-footer"></footer>
    
    <script src="js/main.js"></script>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <script type="text/javascript">
       (function(){
          // Reemplaza estas XXXXX con la Public Key que sacas de Account > API Keys
          emailjs.init("h3oIE9KDa7Ujtsnw_"); 
       })();
    </script>

    <script src="js/cotizacion.js"></script>
</body>
</html>
