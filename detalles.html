<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto - Comercializadora Makro SPA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/productosdetalles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon/favicon-16x16.png">
    <link rel="manifest" href="images/favicon/site.webmanifest">
</head>
<body>

    <div id="header-placeholder"></div>

  <main class="container">
        <div id="product-detail-container" class="detalle-producto">
            <div class="detalle-grid">
                
                <div class="detalle-imagen">
                    <img id="main-img" src="img/placeholder.jpg" alt="Cargando...">
                </div>

                <div class="detalle-info">
                    <h1 id="prod-title">Cargando producto...</h1>
                    <p id="prod-price" class="precio-grande"></p>
                    
                    <p id="prod-stock" class="stock-info">Verificando existencias...</p>

                    <div class="acciones-compra">
                        <div class="compra-container"> <div class="selector-cantidad">
                                <label for="cantidad">Cantidad:</label>
                                <input type="number" id="cantidad" value="1" min="1" max="99">
                            </div>
                            <button id="btn-add-cart" class="btn-comprar-ahora">
                                <i class="fas fa-shopping-cart"></i> Añadir al Carro
                            </button>
                        </div>
                    </div>

                    <hr>

                    <div id="prod-description" class="descripcion-texto">
                        <p>Cargando especificaciones...</p>
                    </div>

                    <div class="footer-detalles">
                        <a href="productos.html" class="btn-volver">← Volver al catálogo</a>
                    </div>
                </div>

            </div>
        </div>
    </main>
    
    <div id="carrito-placeholder"></div>
    <div id="whatsapp-placeholder"></div>
    <div id="footer-placeholder"></div>
    <script src="js/main.js"></script> 
    <script src="js/detalles.js"></script>
</body>
</html>
